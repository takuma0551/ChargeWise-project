    <style>
        :root {
            --primary: #2563EB;
            --primary-light: #EFF6FF;
            --bg: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --border: #E5E7EB;
            --warning: #F59E0B;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            padding: 36px 20px 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 680px;
            width: 100%;
        }

        /* ---- Header ---- */
        header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
        }
        header .logo-icon {
            color: var(--primary);
            display: flex;
        }
        header .logo-icon svg { width: 28px; height: 28px; }
        header h1 {
            font-size: 21px;
            font-weight: 700;
            color: #111827;
            letter-spacing: -0.01em;
        }

        /* ---- Section ---- */
        .step-section {
            margin-bottom: 28px;
        }

        .step-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border);
        }

        .step-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--primary);
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            flex-shrink: 0;
        }

        /* ---- Card Grid ---- */
        .step-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .step-card {
            aspect-ratio: 1;
            position: relative;
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 8px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
        }

        .step-card:not(.empty):hover {
            transform: scale(1.04);
            border-color: #93C5FD;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.12);
        }

        .step-card.active {
            border-color: var(--primary);
            background: var(--primary-light);
        }

        .step-card.empty {
            background: #F9FAFB;
            pointer-events: none;
            opacity: 0.28;
        }

        .step-card.warning {
            border-style: dashed;
            border-color: var(--warning);
        }
        .step-card.warning:hover {
            border-color: #D97706;
            box-shadow: 0 4px 14px rgba(245, 158, 11, 0.12);
        }

        .card-num {
            position: absolute;
            top: 7px;
            left: 8px;
            font-size: 10px;
            font-weight: 700;
            line-height: 1;
            color: var(--primary);
            background: var(--primary-light);
            width: 17px;
            height: 17px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, color 0.15s;
        }

        .step-card.active .card-num {
            background: var(--primary);
            color: #fff;
        }

        .step-card.warning .card-num {
            color: var(--warning);
            background: #FFFBEB;
        }

        .card-icon {
            color: #9CA3AF;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.15s;
        }
        .card-icon svg { width: 26px; height: 26px; }

        .step-card.active .card-icon { color: var(--primary); }
        .step-card.warning .card-icon { color: var(--warning); }

        .card-label {
            font-size: 12px;
            font-weight: 600;
            text-align: center;
            line-height: 1.4;
            color: var(--text-main);
        }

        .card-meta {
            font-size: 10px;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.3;
        }

        /* ---- Animations ---- */
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-14px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .anim-slide-down { animation: slideDown 0.32s ease both; }
        .anim-fade-up    { animation: fadeUp 0.36s ease both; }

        /* ---- Result ---- */
        .result-box {
            background: var(--card-bg);
            border: 2px solid var(--primary);
            border-radius: 14px;
            padding: 22px;
        }

        .product-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 14px;
        }
        .product-cards.single { grid-template-columns: 1fr; }

        .product-card {
            background: #F8FAFC;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
        }
        .product-card.primary {
            border-color: var(--primary);
            background: var(--primary-light);
        }

        .product-card-label {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--primary);
            margin-bottom: 6px;
        }
        .product-card.secondary .product-card-label { color: var(--text-muted); }
        .product-card-label svg { width: 12px; height: 12px; }

        .product-name {
            font-size: 14px;
            font-weight: 700;
            color: #111827;
            line-height: 1.45;
        }
        .product-card.secondary .product-name { font-weight: 600; color: #374151; }

        .amazon-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 12px;
            padding: 8px 14px;
            background: #FF9900;
            color: #111827;
            font-size: 12px;
            font-weight: 700;
            text-decoration: none;
            border-radius: 8px;
            transition: background 0.15s ease, transform 0.15s ease;
        }
        .amazon-btn:hover {
            background: #E88A00;
            transform: translateY(-1px);
        }
        .amazon-btn svg { width: 13px; height: 13px; }

        .reason-box {
            background: #F8FAFC;
            border-left: 4px solid var(--primary);
            border-radius: 0 8px 8px 0;
            padding: 12px 16px;
        }
        .reason-label {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--primary);
            margin-bottom: 5px;
        }
        .reason-label svg { width: 12px; height: 12px; }
        .reason-text {
            font-size: 13px;
            color: #374151;
            line-height: 1.7;
        }

        .note-box {
            margin-top: 10px;
            background: #FFFBEB;
            border: 1px solid #FDE68A;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 12px;
            color: #92400E;
            line-height: 1.5;
            display: flex;
            align-items: flex-start;
            gap: 6px;
        }
        .note-box svg { width: 14px; height: 14px; flex-shrink: 0; margin-top: 1px; }

        /* ---- Responsive ---- */
        @media (max-width: 480px) {
            body { padding: 24px 14px 48px; }
            .step-grid { gap: 7px; }
            .card-icon svg { width: 20px; height: 20px; }
            .card-label { font-size: 10px; }
            .card-meta { font-size: 9px; }
            .product-cards { grid-template-columns: 1fr; }
        }
    </style>
</head>

        el.style.display = 'block';
        el.classList.remove(animClass);
        reflow(el);
        el.classList.add(animClass);
    }

    function buildStep1Grid() {
        const grid = document.getElementById('step1-grid');
        grid.innerHTML = '';
        step1Options.forEach((opt, i) => {
            const card = document.createElement('div');
            if (!opt) {
                card.className = 'step-card empty';
                grid.appendChild(card);
                return;
            }
            card.className = 'step-card';
            card.innerHTML = `
                <span class="card-num">${opt.id}</span>
                <span class="card-icon"><i data-lucide="${opt.icon}"></i></span>
                <span class="card-label">${opt.label.replace(/\n/g, '<br>')}</span>
                ${opt.meta ? `<span class="card-meta">${opt.meta}</span>` : ''}
            `;
            card.addEventListener('click', () => selectStep1(opt.id, card));
            grid.appendChild(card);
        });
    }

    function selectStep1(id, clickedCard) {
        document.querySelectorAll('#step1-grid .step-card').forEach(c => c.classList.remove('active'));
        clickedCard.classList.add('active');
        selectedStep1 = id;

        const groupKey = (id === '1' || id === '2') ? '1_and_2' : id;
        const features = step2Groups[groupKey] || [];

        const grid = document.getElementById('step2-grid');
        grid.innerHTML = '';

        features.forEach(feat => {
            const card = document.createElement('div');
            if (!feat) {
                card.className = 'step-card empty';
                grid.appendChild(card);
                return;
            }
            card.className = 'step-card' + (feat.warning ? ' warning' : '');
            card.innerHTML = `
                <span class="card-num">${feat.id}</span>
                <span class="card-icon"><i data-lucide="${feat.icon}"></i></span>
                <span class="card-label">${feat.label.replace(/\n/g, '<br>')}</span>
            `;
            card.addEventListener('click', () => selectStep2(feat.id, card));
            grid.appendChild(card);
        });

        const step2 = document.getElementById('step2-section');
        showWithAnim(step2, 'anim-slide-down');

        document.getElementById('result-section').style.display = 'none';

        lucide.createIcons();

        setTimeout(() => step2.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 60);
    }

    function selectStep2(featureId, clickedCard) {
        document.querySelectorAll('#step2-grid .step-card').forEach(c => c.classList.remove('active'));
        clickedCard.classList.add('active');

        const key = `${selectedStep1}_${featureId}`;
        const rec = recommendations[key];
        const resultSection = document.getElementById('result-section');

        if (!rec) {
            resultSection.style.display = 'none';
            return;
        }

        const hasTwoProducts = rec.product2 && rec.product2.trim() !== '';

        const amazonBtn = (name) => `
            <a class="amazon-btn" href="${amazonSearchUrl(name)}" target="_blank" rel="noopener noreferrer">
                <i data-lucide="shopping-cart"></i>Amazonで見る
            </a>`;

        let cardsHTML = `
            <div class="product-cards${hasTwoProducts ? '' : ' single'}">
                <div class="product-card primary">
                    <div class="product-card-label"><i data-lucide="package"></i>おすすめ①</div>
                    <div class="product-name">${rec.product1}</div>
                    ${amazonBtn(rec.product1)}
                </div>
                ${hasTwoProducts ? `
                <div class="product-card secondary">
                    <div class="product-card-label"><i data-lucide="package-2"></i>おすすめ②</div>
                    <div class="product-name">${rec.product2}</div>
                    ${amazonBtn(rec.product2)}
                </div>` : ''}
            </div>
        `;

        const noteHTML = rec.note ? `
            <div class="note-box">
                <i data-lucide="alert-triangle"></i>
                <span>${rec.note}</span>
            </div>
        ` : '';

        const reasonHTML = `
            <div class="reason-box">
                <div class="reason-label"><i data-lucide="info"></i>おすすめ理由</div>
                <div class="reason-text">${rec.reason}</div>
            </div>
        `;

        document.getElementById('result-box').innerHTML = cardsHTML + noteHTML + reasonHTML;

        showWithAnim(resultSection, 'anim-fade-up');

        lucide.createIcons();

        setTimeout(() => resultSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 60);
    }

    buildStep1Grid();
    lucide.createIcons();
</script>
</body>
</html>
